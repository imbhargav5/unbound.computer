name: Build macOS Production Desktop

on:
  workflow_call:
    inputs:
      ref:
        required: true
        type: string
      version:
        required: false
        type: string
      release_tag:
        required: false
        type: string
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build
        required: false
        default: main
        type: string
      version:
        description: Override release version
        required: false
        type: string
      release_tag:
        description: Existing GitHub release tag to upload into
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build Apple Silicon Release Artifacts
    runs-on: macos-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: CI Setup
        uses: ./.github/actions/ci-setup

      - name: Resolve release version
        id: version
        run: |
          VERSION="${{ inputs.version }}"
          if [[ -z "$VERSION" ]]; then
            VERSION="$(pnpm tsx scripts/release/get-current-version.ts)"
          fi

          if [[ -z "$VERSION" ]]; then
            echo "ERROR: Could not determine release version." >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building macOS release version: $VERSION"

      - name: Validate signing and notarization secrets
        env:
          MACOS_CERT_BASE64: ${{ secrets.MACOS_CERT_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          MACOS_TEAM_ID: ${{ secrets.MACOS_TEAM_ID }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_NOTARYTOOL_KEY_ID: ${{ secrets.APPLE_NOTARYTOOL_KEY_ID }}
          APPLE_NOTARYTOOL_ISSUER_ID: ${{ secrets.APPLE_NOTARYTOOL_ISSUER_ID }}
          APPLE_NOTARYTOOL_PRIVATE_KEY: ${{ secrets.APPLE_NOTARYTOOL_PRIVATE_KEY }}
        run: |
          missing=()

          for secret_name in \
            MACOS_CERT_BASE64 \
            MACOS_CERT_PASSWORD \
            MACOS_TEAM_ID \
            MACOS_SIGNING_IDENTITY
          do
            if [[ -z "${!secret_name}" ]]; then
              missing+=("$secret_name")
            fi
          done

          has_notary_api_key=0
          if [[ -n "$APPLE_NOTARYTOOL_KEY_ID" && -n "$APPLE_NOTARYTOOL_ISSUER_ID" && -n "$APPLE_NOTARYTOOL_PRIVATE_KEY" ]]; then
            has_notary_api_key=1
          fi

          has_notary_apple_id=0
          if [[ -n "$APPLE_ID" && -n "$APPLE_ID_PASSWORD" ]]; then
            has_notary_apple_id=1
          fi

          if [[ "$has_notary_api_key" != "1" && "$has_notary_apple_id" != "1" ]]; then
            missing+=("APPLE_ID + APPLE_ID_PASSWORD or APPLE_NOTARYTOOL_KEY_ID + APPLE_NOTARYTOOL_ISSUER_ID + APPLE_NOTARYTOOL_PRIVATE_KEY")
          fi

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required macOS production release secrets:\n' >&2
            printf -- '- %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Configure signing keychain
        env:
          MACOS_CERT_BASE64: ${{ secrets.MACOS_CERT_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD="$(uuidgen)"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          echo "$MACOS_CERT_BASE64" | base64 --decode > /tmp/macos-cert.p12 2>/dev/null || echo "$MACOS_CERT_BASE64" | base64 -D > /tmp/macos-cert.p12
          security import /tmp/macos-cert.p12 -k build.keychain -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/xcrun
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security list-keychain -d user -s build.keychain

      - name: Generate release env file
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          cat > .env.release <<EOF
          SUPABASE_URL=${SUPABASE_URL}
          SUPABASE_PUBLISHABLE_KEY=${SUPABASE_PUBLISHABLE_KEY}
          UNBOUND_ENV=production
          EOF

      - name: Build release artifacts
        env:
          MACOS_ARCH: arm64
          APP_ZIP_NAME: unbound-desktop-macos-apple-silicon.zip
          DAEMON_ARCHIVE_NAME: unbound-daemon-macos-apple-silicon.zip
          MACOS_TEAM_ID: ${{ secrets.MACOS_TEAM_ID }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          MACOS_RELEASE_VERSION: ${{ steps.version.outputs.version }}
          MACOS_BUILD_NUMBER: ${{ github.run_number }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
        run: |
          ./scripts/release/build-macos-release.sh

      - name: Verify exported desktop app and daemon
        id: exported-app
        run: |
          APP_PATH="$(find dist/macos/export-app -maxdepth 1 -name '*.app' -print -quit)"
          if [[ -z "$APP_PATH" ]]; then
            echo "ERROR: Expected exported .app in dist/macos/export-app." >&2
            exit 1
          fi

          if [[ -e "$APP_PATH/Contents/MacOS/unbound-daemon" ]]; then
            echo "ERROR: Desktop app bundle unexpectedly embeds unbound-daemon." >&2
            exit 1
          fi

          DAEMON_PATH="dist/macos/export-daemon/unbound-daemon"
          if [[ ! -x "$DAEMON_PATH" ]]; then
            echo "ERROR: Expected standalone daemon artifact at $DAEMON_PATH." >&2
            exit 1
          fi

          codesign --verify --deep --strict "$APP_PATH"
          codesign --verify --strict "$DAEMON_PATH"
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "daemon_path=$DAEMON_PATH" >> "$GITHUB_OUTPUT"

      - name: Notarize, staple, and repackage
        env:
          MACOS_TEAM_ID: ${{ secrets.MACOS_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_NOTARYTOOL_KEY_ID: ${{ secrets.APPLE_NOTARYTOOL_KEY_ID }}
          APPLE_NOTARYTOOL_ISSUER_ID: ${{ secrets.APPLE_NOTARYTOOL_ISSUER_ID }}
          APPLE_NOTARYTOOL_PRIVATE_KEY: ${{ secrets.APPLE_NOTARYTOOL_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
        run: |
          NOTARY_PROFILE="unbound-release"
          APP_ZIP_PATH="dist/macos/unbound-desktop-macos-apple-silicon.zip"
          DAEMON_ZIP_PATH="dist/macos/unbound-daemon-macos-apple-silicon.zip"
          APP_PATH="${{ steps.exported-app.outputs.app_path }}"
          DAEMON_PATH="${{ steps.exported-app.outputs.daemon_path }}"
          UPDATER_ARCHIVE_NAME="unbound-desktop-macos-apple-silicon-updater.tar.gz"
          UPDATER_METADATA_NAME="latest.json"

          if [[ -n "$APPLE_NOTARYTOOL_KEY_ID" && -n "$APPLE_NOTARYTOOL_ISSUER_ID" && -n "$APPLE_NOTARYTOOL_PRIVATE_KEY" ]]; then
            echo "$APPLE_NOTARYTOOL_PRIVATE_KEY" > /tmp/AuthKey.p8
            xcrun notarytool store-credentials "$NOTARY_PROFILE" \
              --key /tmp/AuthKey.p8 \
              --key-id "$APPLE_NOTARYTOOL_KEY_ID" \
              --issuer "$APPLE_NOTARYTOOL_ISSUER_ID"
          else
            xcrun notarytool store-credentials "$NOTARY_PROFILE" \
              --apple-id "$APPLE_ID" \
              --team-id "$MACOS_TEAM_ID" \
              --password "$APPLE_ID_PASSWORD"
          fi

          xcrun notarytool submit "$APP_ZIP_PATH" --keychain-profile "$NOTARY_PROFILE" --wait
          xcrun notarytool submit "$DAEMON_ZIP_PATH" --keychain-profile "$NOTARY_PROFILE" --wait
          xcrun stapler staple "$APP_PATH"
          rm -f "$APP_ZIP_PATH"
          ditto -c -k --keepParent "$APP_PATH" "$APP_ZIP_PATH"
          ./scripts/release/generate-desktop-updater-artifacts.sh "$APP_PATH" "dist/macos" "${{ steps.version.outputs.version }}" "v${{ steps.version.outputs.version }}"
          (
            cd dist/macos
            checksum_files=(
              "$(basename "$APP_ZIP_PATH")"
              "$(basename "$DAEMON_ZIP_PATH")"
            )
            if [[ -f "$UPDATER_ARCHIVE_NAME" ]]; then
              checksum_files+=("$UPDATER_ARCHIVE_NAME")
            fi
            if [[ -f "${UPDATER_ARCHIVE_NAME}.sig" ]]; then
              checksum_files+=("${UPDATER_ARCHIVE_NAME}.sig")
            fi
            if [[ -f "$UPDATER_METADATA_NAME" ]]; then
              checksum_files+=("$UPDATER_METADATA_NAME")
            fi
            shasum -a 256 "${checksum_files[@]}" > SHA256SUMS
          )
          spctl -a -vv "$APP_PATH"
          spctl -a -vv -t exec "$DAEMON_PATH"

      - name: Upload assets to GitHub Release
        if: ${{ inputs.release_tag != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          assets=(
            dist/macos/unbound-desktop-macos-apple-silicon.zip
            dist/macos/unbound-daemon-macos-apple-silicon.zip
            dist/macos/SHA256SUMS
          )
          if [[ -f dist/macos/unbound-desktop-macos-apple-silicon-updater.tar.gz ]]; then
            assets+=(dist/macos/unbound-desktop-macos-apple-silicon-updater.tar.gz)
          fi
          if [[ -f dist/macos/unbound-desktop-macos-apple-silicon-updater.tar.gz.sig ]]; then
            assets+=(dist/macos/unbound-desktop-macos-apple-silicon-updater.tar.gz.sig)
          fi
          if [[ -f dist/macos/latest.json ]]; then
            assets+=(dist/macos/latest.json)
          fi
          gh release upload \
            "${{ inputs.release_tag }}" \
            "${assets[@]}" \
            --clobber

      - name: Upload workflow artifacts
        if: ${{ inputs.release_tag == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: unbound-desktop-v${{ steps.version.outputs.version }}-apple-silicon
          path: |
            dist/macos/unbound-desktop-macos-apple-silicon.zip
            dist/macos/unbound-daemon-macos-apple-silicon.zip
            dist/macos/SHA256SUMS
            dist/macos/unbound-desktop-macos-apple-silicon-updater.tar.gz
            dist/macos/unbound-desktop-macos-apple-silicon-updater.tar.gz.sig
            dist/macos/latest.json
          if-no-files-found: error
